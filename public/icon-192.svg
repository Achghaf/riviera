<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="sunGrad" x1="0" x2="1">
      <stop offset="0" stop-color="#FFD166"/>
      <stop offset="1" stop-color="#FF8A00"/>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" rx="28" fill="#FDFAF4"/>
  <g transform="translate(96,96)">
    <!-- Sun core -->
    <circle cx="0" cy="0" r="40" fill="url(#sunGrad)" />
    <!-- Soft glow -->
    <circle cx="0" cy="0" r="56" fill="none" stroke="rgba(255,138,0,0.12)" stroke-width="20" />

    <!-- Rays -->
    <g stroke="#FFB74D" stroke-width="6" stroke-linecap="round">
      <line x1="0" y1="-74" x2="0" y2="-56" />
      <line x1="0" y1="74" x2="0" y2="56" />
      <line x1="-74" y1="0" x2="-56" y2="0" />
      <line x1="74" y1="0" x2="56" y2="0" />
      <line x1="-52" y1="-52" x2="-40" y2="-40" />
      <line x1="52" y1="52" x2="40" y2="40" />
      <line x1="52" y1="-52" x2="40" y2="-40" />
      <line x1="-52" y1="52" x2="-40" y2="40" />
    </g>

    <!-- Center highlight -->
    <circle cx="-10" cy="-10" r="10" fill="rgba(255,255,255,0.35)" />
  </g>
</svg>
